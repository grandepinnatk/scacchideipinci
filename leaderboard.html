<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classifica — Scacchi dei Pinci</title>
<style>
  :root {
    --bg:      #0d0c0b;
    --bg2:     #161412;
    --bg3:     #1e1b18;
    --border:  rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.16);
    --text:    #e8e4dc;
    --text2:   #a09890;
    --text3:   #5a534e;
    --gold:    #d4a843;
    --goldbg:  rgba(212,168,67,0.10);
    --p1:      #4a9eff;
    --p2:      #ff6b47;
    --radius:  8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', serif;
    min-height: 100vh;
    padding: 24px 16px;
  }

  .page { max-width: 700px; margin: 0 auto; }

  .topbar {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }
  .btn-back {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text2);
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, color 0.15s;
    font-family: Georgia, serif;
  }
  .btn-back:hover { background: var(--bg3); color: var(--text); }
  .page-title {
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 0.05em;
  }

  .lb-meta {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 20px;
    font-family: monospace;
    letter-spacing: 0.05em;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead th {
    text-align: left;
    padding: 8px 12px;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text3);
    border-bottom: 1px solid var(--border2);
    font-family: Georgia, serif;
    text-transform: uppercase;
    position: sticky;
    top: 0;
    background: var(--bg);
  }
  tbody td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
    color: var(--text);
    font-family: Georgia, serif;
  }
  tbody tr:hover td { background: var(--bg2); }

  .lb-me td { background: var(--goldbg) !important; color: var(--gold); }
  .lb-me td:first-child { border-left: 3px solid var(--gold); }

  .rank { color: var(--text3); font-size: 13px; width: 44px; }
  .rank.top3 { color: var(--gold); font-size: 16px; font-weight: bold; }
  .name { font-weight: bold; }
  .elo  { color: var(--p1); font-weight: bold; }
  .wins { color: var(--p2); }

  .medal { font-size: 18px; }

  .sep-row td {
    text-align: center;
    color: var(--text3);
    font-size: 12px;
    padding: 6px;
    border: none;
    background: transparent !important;
  }

  .spinner {
    text-align: center;
    padding: 60px;
    color: var(--text3);
    font-size: 14px;
  }
  .spinner::after {
    content: '';
    display: inline-block;
    width: 24px; height: 24px;
    border: 2px solid var(--border2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-left: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .err { text-align: center; padding: 40px; color: #e05555; font-size: 14px; }

  @media (min-width: 600px) {
    tbody td { font-size: 18px; padding: 12px 14px; }
    thead th { padding: 10px 14px; font-size: 12px; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="topbar">
    <a class="btn-back" href="index.html">← Lobby</a>
    <span class="page-title">⚔ Classifica globale</span>
  </div>

  <div class="lb-meta" id="lb-meta">Caricamento…</div>

  <table>
    <thead>
      <tr>
        <th class="rank">#</th>
        <th>Giocatore</th>
        <th>ELO</th>
        <th>Vittorie</th>
        <th>Partite</th>
      </tr>
    </thead>
    <tbody id="lb-body">
      <tr><td colspan="5"><div class="spinner">Caricamento classifica</div></td></tr>
    </tbody>
  </table>

</div>

<script type="module">
import { initializeApp }  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getDatabase, ref, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey:            "AIzaSyBBojqNJEJ935iiXiqcmshI0hNS1iD3dow",
  authDomain:        "scacchideipincimp.firebaseapp.com",
  projectId:         "scacchideipincimp",
  storageBucket:     "scacchideipincimp.firebasestorage.app",
  messagingSenderId: "887139659354",
  appId:             "1:887139659354:web:630ab968b99e04495d3263",
  databaseURL:       "https://scacchideipincimp-default-rtdb.europe-west1.firebasedatabase.app"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);

const MEDALS = ['🥇', '🥈', '🥉'];

async function loadLeaderboard(myUid) {
  const tbody  = document.getElementById('lb-body');
  const metaEl = document.getElementById('lb-meta');

  try {
    const snap = await get(ref(db, 'users'));
    if (!snap.exists()) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:#5a534e">Nessun giocatore registrato</td></tr>';
      return;
    }

    const users = [];
    snap.forEach(c => {
      const v = c.val();
      if (v && (v.displayName || v.elo)) users.push({ uid: c.key, ...v });
    });
    users.sort((a, b) => (b.elo || 1000) - (a.elo || 1000));

    const myRank = myUid ? users.findIndex(u => u.uid === myUid) : -1;

    metaEl.textContent = `${users.length} giocatori registrati${myRank >= 0 ? ` · La tua posizione: #${myRank + 1}` : ''}`;

    tbody.innerHTML = '';

    users.forEach((u, i) => {
      const isMe = myUid && u.uid === myUid;
      const tr   = document.createElement('tr');
      if (isMe) tr.className = 'lb-me';

      const rankDisplay = i < 3
        ? `<span class="medal">${MEDALS[i]}</span>`
        : `<span>${i + 1}</span>`;

      tr.innerHTML = `
        <td class="rank ${i < 3 ? 'top3' : ''}">${rankDisplay}</td>
        <td class="name">${u.displayName || '?'}${isMe ? ' <span style="font-size:11px;color:var(--gold)">(tu)</span>' : ''}</td>
        <td class="elo">${u.elo || 1000}</td>
        <td class="wins">${u.wins || 0}</td>
        <td style="color:var(--text2)">${u.played || 0}</td>`;
      tbody.appendChild(tr);
    });

  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="err">Errore: ${e.message}</div></td></tr>`;
    metaEl.textContent = '';
  }
}

onAuthStateChanged(auth, user => {
  loadLeaderboard(user ? user.uid : null);
});
</script>
</body>
</html>
